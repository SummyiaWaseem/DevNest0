<!DOCTYPE html>
<html>
<head><title>DevNest-Register</title>
<style>
* {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body, html {
            height: 100%;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .left {
            flex: 1;
            background: url('logo.png') no-repeat center center;
            background-size: cover;
        }
        .right {
            flex: 1;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .right h2 {
            margin-bottom: 10px;
            font-size: 32px;
            color: #111;
        }

        .right p.subtitle {
            margin-bottom: 30px;
            color: #555;
        }

        form {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        input[type="checkbox"] {
            margin-right: 10px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        button {
            padding: 12px;
            background-color: #111;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #333;
        }

        .login-link {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }

        .login-link a {
            color: #111;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media screen and (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            .left, .right {
                flex: none;
                width: 100%;
                height: 50vh;
            }
        }
</style></head>
<body>
<div class="container">
<div class="left"></div>
<div class="right">
<h2>Create Account</h2>
<p>Please fill the details below</p>
<form>
<label>Full Name</label>
<input type="text" placeholder="Enter your full name">
<label>Email</label>
<input type="email" placeholder="Enter your email">
<label>Create Password</label>
<input type="password" placeholder="Password">
<label>Confirm Password</label>
<input type="password" placeholder="Password">
<div class="checkbox-container">
<input type="checkbox"><span>I agree to the terms and conditions</span>
</div>
<button type="button" onclick="window.location.href='index.html'">Register</button>
</form>
<p>Already have an account?<a href="login.html">Login</a></p>
</div>
</div>
</body>
</html>
