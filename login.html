<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevNest-Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* LEFT IMAGE SECTION */
        .right {
            width: 50%;
            background: #f3f3f3;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url("LOGO.jpeg") no-repeat center center;
    background-size: cover;   /* This fills perfectly */
        }

        .right img {
            width: 100%;
            max-width: 500px;
            object-fit: cover;

        }
        .right {
    width: 50%;
    height: 100vh;
    overflow: hidden;
}

.right img {
    width: 100%;
    height: 100%;
    object-fit: cover;   /* This makes image fill the area */
    display: block;
}


        /* RIGHT FORM SECTION */
        .left {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
        }

        .form-box {
            width: 80%;
            max-width: 400px;
        }

        .form-box h2 {
            margin-bottom: 10px;
            font-size: 28px;
        }

        .form-box p {
            margin-bottom: 25px;
            color: gray;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .form-options a {
            text-decoration: none;
            color: #6c4fd3;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #6c4fd3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .google-btn {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            border-radius: 4px;
        }

        .signup {
            margin-top: 15px;
            font-size: 13px;
            text-align: center;
        }

        .signup a {
            color: #6c4fd3;
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .left, .right {
                width: 100%;
                height: 50vh;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- LEFT IMAGE -->
    <div class="right">
        <img src="LOGO.jpeg" alt="Login Image">
    </div>

    <!-- RIGHT FORM -->
    <div class="left">
        <div class="form-box">
            <h2>Welcome back</h2>
            <p>Please enter your details</p>

            <div class="form-group">
                <label>Email address</label>
                <input type="email" placeholder="Enter email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password">
            </div>

            <div class="form-options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>

            <button class="btn">Log In</button>
            <button class="google-btn">Log in with Google</button>

            <div class="signup">
                Don’t have an account? <a href="register.html">Register</a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
